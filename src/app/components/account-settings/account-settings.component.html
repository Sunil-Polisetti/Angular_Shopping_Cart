<div class="settings-page">
  <div class="settings-card animate-fade-in">
    <div class="settings-header">
      <h2>⚙️ Account Settings</h2>
      <p>Manage your profile details and security settings.</p>
    </div>

    <form (ngSubmit)="updateProfile()" #settingsForm="ngForm">
      <!-- Profile Section -->
      <div class="settings-section">
        <h3>Profile Information</h3>
        
        <div class="form-group">
          <label for="email">Email Address (Cannot be changed)</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [value]="email" 
            class="form-control read-only" 
            readonly 
          />
        </div>

        <div class="form-group">
          <label for="name">Full Name *</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            [(ngModel)]="name" 
            class="form-control" 
            required 
            placeholder="Enter your name"
          />
        </div>
      </div>

      <!-- Password Section -->
      <div class="settings-section">
        <h3>Change Password</h3>
        <p class="section-desc">Leave these fields blank if you do not want to change your password.</p>

        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <input 
            type="password" 
            id="currentPassword" 
            name="currentPassword" 
            [(ngModel)]="currentPassword" 
            class="form-control" 
            placeholder="Enter current password"
          />
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input 
            type="password" 
            id="newPassword" 
            name="newPassword" 
            [(ngModel)]="newPassword" 
            class="form-control" 
            placeholder="Enter new password"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            [(ngModel)]="confirmPassword" 
            class="form-control" 
            placeholder="Confirm new password"
          />
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="form-actions">
        <button 
          type="submit" 
          class="btn btn-primary btn-save" 
          [disabled]="loading || !name.trim()"
        >
          <span *ngIf="!loading">💾 Save Changes</span>
          <span *ngIf="loading">⏳ Saving...</span>
        </button>
        <button type="button" (click)="goHome()" class="btn btn-secondary">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
